<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Auto-Embed</title>
    <style>
        /* Usuwamy domyślne marginesy przeglądarki */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Ukrywa paski przewijania */
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000; /* Czarne tło (jak w kinie) */
        }
        
        /* Iframe wypełnia cały kontener */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Styl dla komunikatu o błędzie (gdy brak ID) */
        .status {
            font-family: Arial, sans-serif;
            font-size: 1.2rem;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="status" class="status">Ładowanie filmu...</div>
</div>

<script>
    // 1. Pobranie parametru 'query' z adresu URL
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('query');

    const container = document.getElementById('container');

    if (videoId) {
        // 2. Jeśli videoId istnieje, generujemy iframe.
        // Dodajemy parametry &autoplay=1 oraz &mute=1 do adresu URL.
        // parametr "allow" również musi zawierać 'autoplay'.
        container.innerHTML = `
            <iframe 
                src="https://www.youtube.com/embed/${encodeURIComponent(videoId)}?autoplay=1" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        `;
    } else {
        // Jeśli ktoś wejdzie na stronę bez parametru ?query=
        document.getElementById('status').innerText = "Brak ID filmu w adresie URL. Przykład: ?query=d0l-4Dy_uKI";
    }
</script>

</body>
</html>
